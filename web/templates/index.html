<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blender Render Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #111; color: #eee; font-family: sans-serif; max-width: 60%; margin: 80px auto; padding: 0 20px;">
    <div style="margin: auto;">
        <h1 style="color: #ff6400;">🎬 Blender Render Server</h1>
        <p>Version 0.1 ALPHA. NOT FOR PRODUCTION USE!</p>
        <form style="margin: 20px 0;" action="/upload" enctype="multipart/form-data" method="post">
            <input name="file" type="file" accept=".blend,.zip">
            <button class="btn btn-primary" type="submit">Upload & Render</button>
        </form>
        <hr>
        <a href="/delete-all"><button class="btn btn-danger">⚠️ Delete All Jobs</button></a>
    </div>
</body>
</html>
