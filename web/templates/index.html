<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blender Render Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #111; color: #eee; }
        .card { background-color: #1c1c1c; border-color: #333; }
        .card-header { background-color: #222; border-color: #333; }
        .form-control, .form-control:focus { background-color: #2a2a2a; border-color: #444; color: #eee; }
        .job-card { text-decoration: none; color: #eee; transition: transform 0.15s; }
        .job-card:hover { transform: translateY(-2px); }
        .job-card:hover .card { border-color: #ff6400 !important; }
        .badge-frames { background-color: #ff6400; color: #000; }
    </style>
</head>
<body>
    <div class="container py-5" style="max-width: 860px;">

        <div class="mb-4">
            <h1 class="fw-bold" style="color: #ff6400;">🎬 Blender Render Server</h1>
            <span class="badge bg-warning text-dark">v0.1 ALPHA — NOT FOR PRODUCTION USE</span>
        </div>

        <div class="card mb-3">
            <div class="card-header fw-semibold">New Render Job</div>
            <div class="card-body">
                <form action="/upload" enctype="multipart/form-data" method="post">
                    <div class="mb-3">
                        <label for="file" class="form-label text-secondary">Select a <code>.blend</code> or <code>.zip</code> file</label>
                        <input class="form-control form-control-lg" id="file" name="file" type="file" accept=".blend,.zip">
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Upload &amp; Render</button>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <p class="text-secondary mb-2 small">For projects with external assets, upload a ZIP containing your blend file and all resources:</p>
                <pre class="mb-0 small" style="color: #aaa; background: transparent;">my_project.zip
├── scene.blend
├── video.mp4
├── texture.png
└── hdri.exr</pre>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 text-secondary text-uppercase fw-bold" style="font-size: 0.8rem; letter-spacing: 0.08em;">Past Renders</h5>
            <a href="/delete-all" class="btn btn-outline-danger btn-sm"
               onclick="return confirm('Delete all jobs and renders?')">⚠️ Delete All</a>
        </div>

        <div id="jobs-container">
            <div class="text-center text-secondary py-5">🎞 No renders yet</div>
        </div>

    </div>

    <script>
        async function loadJobs() {
            try {
                const res = await fetch('/jobs');
                const jobs = await res.json();
                const container = document.getElementById('jobs-container');

                if (!jobs.length) {
                    container.innerHTML = '<div class="text-center text-secondary py-5">🎞 No renders yet</div>';
                    return;
                }

                container.innerHTML = `<div class="row g-3">` + jobs.map(job => `
                    <div class="col-6 col-md-4 col-lg-3">
                        <a class="job-card" href="/job/${job.job_id}">
                            <div class="card h-100">
                                ${job.preview
                                    ? `<img src="/renders/${job.preview}" class="card-img-top" style="aspect-ratio:16/9; object-fit:cover;" alt="preview">`
                                    : `<div class="d-flex align-items-center justify-content-center text-secondary" style="aspect-ratio:16/9; background:#2a2a2a;">🎬</div>`
                                }
                                <div class="card-body p-2">
                                    <div class="text-secondary" style="font-size:0.7rem; font-family:monospace;">${job.job_id.slice(0, 8)}…</div>
                                    <span class="badge badge-frames">${job.frames} frame${job.frames !== 1 ? 's' : ''}</span>
                                </div>
                            </div>
                        </a>
                    </div>
                `).join('') + `</div>`;
            } catch(e) {
                console.error('Failed to load jobs', e);
            }
        }

        loadJobs();
    </script>
</body>
</html>
