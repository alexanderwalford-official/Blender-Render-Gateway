name: Build Blender Render Containers

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Web container
    - name: Build Web Container
      run: |
        docker build -t blender-render-gateway_web ./web

    # Build Worker container
    - name: Build Worker Container
      run: |
        docker build -t blender-render-gateway_worker ./worker

    # Push images to Docker Hub
    - name: Push Web image
      run: docker push alexwalford/blender-render-gateway:web
    - name: Push Worker image
      run: docker push alexwalford/blender-render-gateway:worker
