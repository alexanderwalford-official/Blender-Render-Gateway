name: Build Blender Render Containers

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout the repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 3️⃣ Log in to Docker Hub (optional)
    # Uncomment if you want to push images
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}

    # 4️⃣ Build Web container
    - name: Build Web Container
      run: |
        docker build -t blender-render-gateway_web ./web

    # 5️⃣ Build Worker container
    - name: Build Worker Container
      run: |
        docker build -t blender-render-gateway_worker ./worker

    # 6️⃣ (Optional) Push images to Docker Hub
    # Uncomment if you want automatic push
    # - name: Push Web image
    #   run: docker push blender-render-gateway_web
    # - name: Push Worker image
    #   run: docker push blender-render-gateway_worker
